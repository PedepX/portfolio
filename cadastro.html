<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário de Cadastro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="http://localhost/portfolio/assets/css/style.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <form class="form-cadastro" action="/cadastro" method="post">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" placeholder="Digite seu nome" required />

      <label for="idade">Idade:</label>
      <input type="number" id="idade" placeholder="Digite sua idade" required />

      <label for="data_nascimento">Data de Nascimento:</label>
      <input type="date" id="data_nascimento" required />

      <label for="curso_favorito">Curso Favorito:</label>
      <input
        type="text"
        id="curso_favorito"
        placeholder="Digite seu curso favorito"
        required
      />

      <label for="Observações">Observações:</label>
      <textarea
        id="Observações"
        rows="5"
        placeholder="Digite suas observações"
      ></textarea>

      <button type="submit">Cadastrar</button>
    </form>
  </body>
</html>
