<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário de Cadastro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="http://localhost/portfolio/assets/css/style.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- Apresentação -->
      <h1>João Pedro Menezes</h1>
      <h2 class="subtitulo">Futuro Desenvolvedor</h2>
    </header>
    <nav>
      <ul class="navbar">
        <li class="nav-item"><a href="index.html">Inicio</a></li>
        <li class="nav-item"><a href="formulario.html">Contato</a></li>
        <li class="nav-item"><a href="login.html">Login</a></li>
      </ul>
    </nav>
    <form class="form-cadastro" action="/cadastro" method="post">
      <label class="form-label" for="nome">Nome:</label>
      <input type="text" id="nome" placeholder="Digite seu nome" required />

      <label class="form-label" for="idade">Idade:</label>
      <input type="number" id="idade" placeholder="Digite sua idade" required />

      <label class="form-label" for="data_nascimento">Data de Nascimento:</label>
      <input type="date" id="data_nascimento" required />

      <label class="form-label" for="curso_favorito">Curso Favorito:</label>
      <input
        type="text"
        id="curso_favorito"
        placeholder="Digite seu curso favorito"
        required
      />

      <label class="form-label" for="Observações">Observações:</label>
      <textarea
        id="Observações"
        rows="5"
        placeholder="Digite suas observações"
      ></textarea>

      <button type="submit">Cadastrar</button>
    </form>
  </body>
</html>
