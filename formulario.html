<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário de Contato</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="http://localhost/portfolio/assets/css/style.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <!-- Apresentação -->
      <h1>João Pedro Menezes</h1>
      <h2 class="subtitulo">Futuro Desenvolvedor</h2>
    </header>
    <nav>
      <ul class="navbar">
        <li class="nav-item"><a href="index.html">Inicio</a></li>
        <li class="nav-item"><a href="login.html">Login</a></li>
        <li class="nav-item"><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </nav>
    <form class="form-contato"action="/contato" method="post">
      <label class="form-label" for="nome">Nome:</label>
      <input type="text" id="nome" placeholder="Digite seu nome" required />

      <label class="form-label" for="email">Email:</label>
      <input type="email" id="email" placeholder="Digite seu email" required />

      <label class="form-label" for="data">Data:</label>
      <input type="date" id="data" required />

      <label class="form-label" for="assunto">Assunto:</label>
      <select id="assunto" required>
        <option value="" disabled selected>Selecione um assunto</option>
        <option>Dúvida</option>
        <option>Orçamento</option>
        <option>Contato</option>
      </select>

      <label class="form-label" for="mensagem">Mensagem:</label>
      <textarea
        id="mensagem"
        rows="5"
        placeholder="Digite sua mensagem"
      ></textarea>

      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
